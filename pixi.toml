[workspace]
authors = ["Sierra Arn"]
channels = ["conda-forge"]
name = "backend-core"
platforms = ["linux-64"]
version = "0.2.1"

[dependencies]
python = ">=3.14.6,<3.15"
fastapi = ">=0.138.0,<0.139"
uvicorn = ">=0.49.0,<0.50"
pydantic-settings = ">=2.14.2,<3"
alembic = ">=1.18.4,<2"
sqlalchemy = ">=2.0.51,<3"
psycopg-c = ">=3.3.4,<4"
redis-py = ">=8.0.1,<9"
pyjwt = ">=2.13.0,<3"
python-json-logger = ">=4.1.0,<5"
bcrypt = ">=5.0.0,<6"
just = ">=1.54.0,<2"

[pypi-dependencies]
scripts = { path = "./packages/scripts/", editable = true }
shared = { path = "./packages/shared/", editable = true }
server = { path = "./packages/server/", editable = true }
